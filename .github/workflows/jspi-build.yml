name: jspi-build

on:
  push:
    branches: [jspi-syscall-poc, claude/**]

jobs:
  get_python_version:
    runs-on: ubuntu-latest
    outputs:
      PYVERSION: ${{ steps.get_python_version.outputs.PYVERSION }}
    steps:
      - uses: actions/checkout@v6
      - id: get_python_version
        run: |
          echo "PYVERSION=$(git grep 'export PYVERSION ?=' Makefile.envs | cut -d' ' -f4)" >> "$GITHUB_OUTPUT"

  build-core:
    runs-on: ubuntu-latest
    needs: [get_python_version]
    env:
      EMSDK_NUM_CORES: 3
      EMCC_CORES: 3
      PYODIDE_JOBS: 3
      CCACHE_DIR: /tmp/ccache

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/cache/restore@v5
        with:
          path: /tmp/ccache
          key: ${{ hashFiles('Makefile.envs') }}-${{ runner.os }}-jspi-

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: src/js/package-lock.json

      - name: Save Node.js 24 path
        run: echo "NODE24_DIR=$(dirname $(which node))" >> $GITHUB_ENV

      - uses: actions/setup-go@v6
        with:
          go-version: '1.21'
          cache: false

      - name: Restore conda env cache
        id: conda-cache
        uses: actions/cache/restore@v5
        with:
          path: /usr/share/miniconda/envs/pyodide-env
          key: conda-env-${{ hashFiles('environment.yml') }}-${{ runner.os }}

      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: pyodide-env
          environment-file: environment.yml
          channels: conda-forge

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          sudo apt install -y build-essential git xxd
          pip install -r requirements.txt

      - name: Check Versions
        shell: bash -l {0}
        run: |
          export PATH="$NODE24_DIR:$PATH"
          python --version
          node --version
          npm --version
          which python
          which node
          which npm
          which go

      - name: Restore emsdk cache
        id: emsdk-cache
        uses: actions/cache/restore@v5
        with:
          path: emsdk/emsdk
          key: emsdk-${{ hashFiles('Makefile.envs', 'emsdk/Makefile', 'emsdk/patches/**') }}-${{ runner.os }}

      - name: Build emsdk
        id: build-emsdk
        if: steps.emsdk-cache.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          which ccache
          ccache -z
          make -C emsdk
          ccache -s

      - name: Restore cpython cache
        id: cpython-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            cpython/installs
            cpython/build
          key: cpython-${{ hashFiles('Makefile.envs', 'cpython/Makefile', 'cpython/patches/**') }}-${{ runner.os }}

      - name: Build CPython
        id: build-cpython
        if: steps.cpython-cache.outputs.cache-hit != 'true'
        shell: bash -l {0}
        run: |
          source pyodide_env.sh
          which ccache
          ccache -z
          make -C cpython
          ccache -s

      - name: Build Pyodide core
        shell: bash -l {0}
        run: |
          source pyodide_env.sh
          export PATH="$NODE24_DIR:$PATH"
          ccache -z
          rm -rf packages/cffi
          # Patch pyodide-build to accept free-threaded (cp313t) wheel tags
          BUILD_ENV=$(python -c "import pyodide_build.build_env; print(pyodide_build.build_env.__file__)")
          sed -i '/yield from cpython_tags/a\    # Free-threaded (nogil) builds produce cp313t ABI tags\n    abi_t = f"cp{PYMAJOR}{PYMINOR}t"\n    for p in PLATFORMS:\n        yield Tag(f"cp{PYMAJOR}{PYMINOR}", abi_t, p)' "$BUILD_ENV"
          PYODIDE_PACKAGES="tag:core" make -j3
          ccache -s

      - name: Check size
        shell: bash -l {0}
        run: ls -lh dist/

      - name: Save conda env cache
        if: always() && steps.conda-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /usr/share/miniconda/envs/pyodide-env
          key: conda-env-${{ hashFiles('environment.yml') }}-${{ runner.os }}

      - name: Save emsdk cache
        if: always() && steps.emsdk-cache.outputs.cache-hit != 'true' && steps.build-emsdk.outcome == 'success'
        uses: actions/cache/save@v5
        with:
          path: emsdk/emsdk
          key: emsdk-${{ hashFiles('Makefile.envs', 'emsdk/Makefile', 'emsdk/patches/**') }}-${{ runner.os }}

      - name: Save cpython cache
        if: always() && steps.cpython-cache.outputs.cache-hit != 'true' && steps.build-cpython.outcome == 'success'
        uses: actions/cache/save@v5
        with:
          path: |
            cpython/installs
            cpython/build
          key: cpython-${{ hashFiles('Makefile.envs', 'cpython/Makefile', 'cpython/patches/**') }}-${{ runner.os }}

      - name: Save ccache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: /tmp/ccache
          key: ${{ hashFiles('Makefile.envs') }}-${{ runner.os }}-jspi-

      - name: Upload dist
        uses: actions/upload-artifact@v6
        with:
          name: jspi-dist
          path: ./dist/
          retention-days: 30
